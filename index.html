<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - PSICONET360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-[#0f172a] to-[#1e3a8a] min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="glass-card rounded-3xl p-10 max-w-md w-full slide-up text-center block">

        <div class="mx-auto mb-8 flex justify-center">
            <img src="img/logo.png" alt="Logo PSICONET360" class="h-24 w-auto drop-shadow-md">
        </div>

        <h1 class="text-3xl font-extrabold text-[#1e3a8a] mb-2">Portal de Acceso</h1>
        <p class="text-slate-500 mb-10 text-sm">Ingresa tu código de autorización para continuar al panel
            administrativo.</p>

        <div class="space-y-6">
            <div class="relative group">
                <input type="password" id="accessCode" placeholder="Código de acceso"
                    class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-[#1e3a8a] focus:ring-4 focus:ring-blue-800/10 outline-none transition-all text-center text-xl font-bold tracking-widest placeholder:tracking-normal placeholder:font-normal"
                    onkeypress="if(event.key === 'Enter') validateLogin()">
                <div
                    class="absolute inset-y-0 right-14 flex items-center pointer-events-none text-slate-300 group-focus-within:text-[#1e3a8a] transition-colors">
                    <i class="fa-solid fa-key"></i>
                </div>
                <!-- Botón para mostrar/ocultar password -->
                <button type="button" onclick="togglePassword()"
                    class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-[#1e3a8a] transition-colors focus:outline-none">
                    <i id="toggleIcon" class="fa-solid fa-eye"></i>
                </button>
            </div>

            <button id="loginBtn" onclick="validateLogin()"
                class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-900 transition-all shadow-xl shadow-blue-900/20 active:scale-[0.98] flex items-center justify-center gap-3">
                <span>Entrar al Sistema</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>

            <div id="errorMessage"
                class="hidden animate-bounce text-red-600 font-semibold text-sm mt-4 bg-red-50 py-2 rounded-lg border border-red-100">
                ⚠️ Código de acceso incorrecto
            </div>
        </div>

        <div class="mt-12 pt-8 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">UAGRM &middot; Facultad de
                Humanidades</p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://kylsbkxxpsntlhhsdqgw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_7KbBls3f9-VlD0uj2ZU2sg_ll3-mJ5_";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false,
                detectSessionInUrl: false
            }
        });

        function togglePassword() {
            const input = document.getElementById('accessCode');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function validateLogin() {
            const input = document.getElementById('accessCode');
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMessage');
            const code = input.value.trim();

            if (!code) return;

            // UI Feedback
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Verificando...';
            error.classList.add('hidden');

            try {
                // Verificar en la tabla access_codes
                const { data, error: dbError } = await _supabase
                    .from('access_codes')
                    .select('*')
                    .eq('code', code)
                    .eq('is_active', true)
                    .single();

                if (dbError || !data) {
                    throw new Error("Código inválido");
                }

                // Éxito: Guardar sesión y redirigir
                localStorage.setItem('psiconet_session', JSON.stringify({
                    auth: true,
                    timestamp: new Date().getTime()
                }));

                window.location.href = 'a_d_m_i_n.html';

            } catch (err) {
                console.error(err);
                error.classList.remove('hidden');
                input.value = '';
                input.focus();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Entrar al Sistema</span><i class="fa-solid fa-arrow-right text-sm"></i>';
            }
        }

        // Proteger página: si ya está logueado, ir al admin
        if (localStorage.getItem('psiconet_session')) {
            window.location.href = 'a_d_m_i_n.html';
        }
    </script>
</body>

</html>
